name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.VERSION }} \
            --title ${{ steps.version.outputs.VERSION }} \
            --generate-notes

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}

      - name: Cross-compile (Linux arm64)
        if: matrix.cross
        uses: houseabsolute/commands-cross@v1
        with:
          command: cargo build --release --target ${{ matrix.target }}
          target: ${{ matrix.target }}

      - name: Build release binary
        if: !matrix.cross
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          BIN="image-mcp"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="image-mcp.exe"
          fi

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN}" dist/

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "image-mcp-${VERSION}-${TARGET}.zip" dist/${BIN}
            UPLOAD_FILE="image-mcp-${VERSION}-${TARGET}.zip"
          else
            tar -czf "image-mcp-${VERSION}-${TARGET}.tar.gz" dist/${BIN}
            UPLOAD_FILE="image-mcp-${VERSION}-${TARGET}.tar.gz"
          fi
          echo "UPLOAD_FILE=${UPLOAD_FILE}" >> $GITHUB_ENV

      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ env.UPLOAD_FILE }}