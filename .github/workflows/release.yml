name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: 1.97.0
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release context
    runs-on: ubuntu-latest
    outputs:
      create_tag: ${{ steps.resolve.outputs.create_tag }}
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^[[:space:]]*version[[:space:]]*=' Cargo.toml | sed 's/.*=[[:space:]]*"\([^"]*\)".*/\1/')
          echo "Extracted version from Cargo.toml: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Resolve release inputs
        id: resolve
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          echo "Event: ${{ github.event_name }}"
          echo "Computed tag from Cargo.toml version: ${TAG}"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Triggered by tag push (${{ github.ref_name }}) -> releasing directly, no tag creation needed"
            echo "create_tag=false" >> $GITHUB_OUTPUT
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            echo "Triggering CI run did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}) -> skipping release"
            echo "create_tag=false" >> $GITHUB_OUTPUT
            echo "ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "CI succeeded on master (sha: ${{ github.event.workflow_run.head_sha }}) -> checking for existing tag ${TAG}"
          git fetch --tags 2>/dev/null || true
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "${TAG}")
            echo "Tag ${TAG} already exists, pointing at ${TAG_SHA}"
            if [[ "${TAG_SHA}" == "${{ github.event.workflow_run.head_sha }}" ]]; then
              echo "Tag already points at this commit -> skipping this workflow_run to avoid duplicate release"
              echo "create_tag=false" >> $GITHUB_OUTPUT
              echo "ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
              echo "tag=${TAG}" >> $GITHUB_OUTPUT
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "Tag points at a different commit -> not creating/moving it, skipping release for this run"
              echo "create_tag=false" >> $GITHUB_OUTPUT
              echo "ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
              echo "tag=${TAG}" >> $GITHUB_OUTPUT
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Tag ${TAG} does not exist yet -> will create and push it, then continue release in the same run"
            echo "create_tag=true" >> $GITHUB_OUTPUT
            echo "ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_run' && steps.resolve.outputs.create_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists (created by a concurrent run?), skipping tag creation"
            exit 0
          fi
          echo "Creating tag ${TAG} at ${{ github.event.workflow_run.head_sha }} and pushing it"
          git tag "$TAG" "${{ github.event.workflow_run.head_sha }}"
          git push origin "$TAG"
          echo "Tag ${TAG} pushed"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping creation"
            exit 0
          fi
          echo "Creating GitHub release ${TAG}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
          echo "Release ${TAG} created"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [prepare, create-release]
    if: needs.prepare.outputs.should_release == 'true' && needs.create-release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "Installing gcc-aarch64-linux-gnu cross linker"
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        run: |
          echo "Setting up Rust $RUST_VERSION with target ${{ matrix.target }}"
          rustup default "$RUST_VERSION"
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}

      - name: Build release binary
        run: |
          echo "Building release binary for ${{ matrix.target }}"
          cargo build --release --target ${{ matrix.target }}
          echo "Build finished"

      - name: Package
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          BIN="image-mcp"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="image-mcp.exe"
          fi

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN}" dist/
          echo "Copied ${BIN} to dist/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "image-mcp-${VERSION}-${TARGET}.zip" dist/${BIN}
            UPLOAD_FILE="image-mcp-${VERSION}-${TARGET}.zip"
          else
            tar -czf "image-mcp-${VERSION}-${TARGET}.tar.gz" dist/${BIN}
            UPLOAD_FILE="image-mcp-${VERSION}-${TARGET}.tar.gz"
          fi
          echo "Packaged archive: ${UPLOAD_FILE}"
          echo "UPLOAD_FILE=${UPLOAD_FILE}" >> $GITHUB_ENV

      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading ${{ env.UPLOAD_FILE }} to release ${{ needs.prepare.outputs.tag }}"
          gh release upload ${{ needs.prepare.outputs.tag }} ${{ env.UPLOAD_FILE }} --clobber
          echo "Upload complete"
