name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: 1.97.0

jobs:
  ci:
    name: Check, test, clippy, fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          echo "Installing Rust toolchain $RUST_VERSION (clippy + rustfmt)"
          rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy --component rustfmt
          rustup default "$RUST_VERSION"
          echo "Active toolchain:"
          rustup show active-toolchain
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: |
          echo "Running cargo check --all --all-targets --all-features"
          cargo check --all --all-targets --all-features
          echo "cargo check passed"

      - name: cargo test
        run: |
          echo "Running cargo test --all"
          cargo test --all
          echo "cargo test passed"

      - name: cargo clippy
        run: |
          echo "Running cargo clippy --all --all-targets --all-features -- -D warnings"
          cargo clippy --all --all-targets --all-features -- -D warnings
          echo "cargo clippy passed with no warnings"

      - name: cargo fmt --check
        run: |
          echo "Running cargo fmt --all -- --check"
          cargo fmt --all -- --check
          echo "cargo fmt check passed"
